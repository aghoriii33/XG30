services:
  - type: web
    name: jarvis-backend
    env: python
    region: ohio
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: DATABASE_PATH
        value: /data/app.db
      - key: CORS_ORIGINS
        value: "*"
      - key: FIREBASE_MOCK
        value: "true"
