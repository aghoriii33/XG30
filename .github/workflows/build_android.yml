name: Build Android APKs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          cd jarvis_ai
          flutter pub get

      - name: Build Split APKs
        run: |
          cd jarvis_ai
          flutter build apk --release --split-per-abi

      - name: Upload arm64 APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-android-arm64
          path: jarvis_ai/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload arm32 APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-android-arm32
          path: jarvis_ai/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
